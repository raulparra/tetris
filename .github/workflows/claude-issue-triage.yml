name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio
            (un Tetris en JavaScript vanilla, ver CLAUDE.md para la arquitectura del juego).

            Título: ${{ github.event.issue.title }}

            Cuerpo:
            ${{ github.event.issue.body }}

            Tareas:

            1. Elige una o varias labels apropiadas para este issue, usando
               ÚNICAMENTE labels que ya existen en el repositorio:
               bug, enhancement, question, documentation, duplicate, invalid,
               wontfix, help wanted, good first issue.
               Aplícalas con:
                 gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2"

            2. Redacta un diagnóstico general del problema, en el mismo idioma
               del issue (por defecto español), que sirva de base para implementar
               la solución más adelante. Debe incluir:
               - Causa probable del problema (o, si es una petición de mejora,
                 qué se necesita implementar).
               - Componente del código afectado según la arquitectura descrita
                 en CLAUDE.md (modelo de tablero, piezas/rotación, colisiones,
                 wall kicks, loop de juego, line clearing, scoring/leveling,
                 ghost piece, etc.).
               - Próximos pasos sugeridos para abordarlo.

               El comentario debe empezar exactamente con este encabezado, para
               poder identificarlo en futuras ediciones:
                 ## 🔍 Diagnóstico automático

            3. Antes de publicar, comprueba si ya existe un comentario tuyo con
               ese encabezado:
                 gh issue view ${{ github.event.issue.number }} --json comments
               - Si ya existe, actualízalo (no publiques uno nuevo) con:
                 gh issue comment ${{ github.event.issue.number }} --edit-last --body "..."
               - Si no existe ninguno, créalo con:
                 gh issue comment ${{ github.event.issue.number }} --body "..."
